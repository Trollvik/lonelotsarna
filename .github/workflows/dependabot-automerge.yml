# Auto-mergar Dependabot-PRs för minor/patch. Major-bumps blockeras
# i dependabot.yml så de når aldrig hit.
#
# --auto-flaggan kräver att repo har auto-merge aktiverat (GitHub Pro
# för privata repos). Om det inte är på, faller vi tillbaka till direkt
# squash-merge — Dependabot kör sin egen validering innan PR skapas, så
# fallback är OK för repos utan PR-checks.

name: Dependabot auto-merge
on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  automerge:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Hämta Dependabot-metadata
        id: meta
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge minor/patch
        if: steps.meta.outputs.update-type == 'version-update:semver-patch' || steps.meta.outputs.update-type == 'version-update:semver-minor'
        run: gh pr merge --auto --squash "$PR_URL" || gh pr merge --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
